<!DOCTYPE html>
<html>
<head>
<title>Artisan Dashboard</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
width:90%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ccc;
}

th{
background:#0077ff;
color:white;
}

input{
padding:8px;
margin:10px;
}
</style>

</head>

<body>

<h2>Artisan Dashboard</h2>

<p>Enter your phone number to see your bookings</p>

<input type="text" id="artisanPhone" placeholder="Enter your phone number">

<button onclick="loadBookings()">View My Bookings</button>

<table>
<thead>
<tr>
<th>Customer</th>
<th>Phone</th>
<th>Service</th>
<th>Date</th>
<th>Time</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

<script>

function loadBookings(){

let phone = document.getElementById("artisanPhone").value;

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

let table = document.getElementById("bookingTable");

table.innerHTML="";

bookings.forEach(b => {

if(b.artisanPhone === phone){

let row = `
<tr>
<td>${b.customerName}</td>
<td>${b.phone}</td>
<td>${b.service}</td>
<td>${b.date}</td>
<td>${b.time}</td>
</tr>
`;

table.innerHTML += row;

}

});

}

</script>

</body>
</html>
