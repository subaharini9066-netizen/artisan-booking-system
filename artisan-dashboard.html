<!DOCTYPE html>
<html>
<head>
<title>Artisan Dashboard</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.booking{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
border-radius:5px;
}
</style>

</head>

<body>

<div class="container">

<h2>Artisan Dashboard</h2>

<input type="text" id="artisanPhone" placeholder="Enter Your Phone Number">

<button onclick="loadBookings()">Load My Bookings</button>

<div id="bookingList"></div>

</div>

<script>

function loadBookings(){

let phone = document.getElementById("artisanPhone").value;

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

let result = bookings.filter(function(b){
return b.artisanPhone === phone;
});

let bookingList = document.getElementById("bookingList");

bookingList.innerHTML = "";

if(result.length === 0){
bookingList.innerHTML = "<p>No bookings found</p>";
return;
}

result.forEach(function(b){

bookingList.innerHTML += `
<div class="booking">
<p><b>Customer:</b> ${b.customerName}</p>
<p><b>Phone:</b> ${b.phone}</p>
<p><b>Service:</b> ${b.service}</p>
<p><b>Date:</b> ${b.date}</p>
<p><b>Time:</b> ${b.time}</p>
</div>
`;

});

}

</script>

</body>
</html>
