<!DOCTYPE html>
<html>
<head>
<title>Artisan Dashboard</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

.booking{
border:1px solid #ddd;
padding:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Artisan Dashboard</h2>

<input id="artisanPhone" placeholder="Enter your phone number">

<button onclick="loadBookings()">Load My Bookings</button>

<div id="bookingList"></div>

</div>

<script>

function loadBookings(){

let phone = document.getElementById("artisanPhone").value;

let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

let filtered = bookings.filter(function(b){
return b.artisanPhone === phone;
});

let container = document.getElementById("bookingList");

container.innerHTML = "";

if(filtered.length === 0){
container.innerHTML = "<p>No bookings found</p>";
return;
}

filtered.forEach(function(b){

container.innerHTML += `
<div class="booking">
<p><b>Customer:</b> ${b.customerName}</p>
<p><b>Phone:</b> ${b.phone}</p>
<p><b>Service:</b> ${b.service}</p>
<p><b>Date:</b> ${b.date}</p>
<p><b>Time:</b> ${b.time}</p>
</div>
`;

});

}

</script>

</body>
</html>
