<!DOCTYPE html>
<html>
<head>
<title>Local Artisan Services</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#0077ff;
color:white;
text-align:center;
padding:30px;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

.map-section{
margin:40px;
text-align:center;
}

iframe{
width:90%;
height:350px;
border:0;
border-radius:10px;
}

</style>

</head>

<body>

<header>

<h1>Local Artisan Services</h1>

<p>Book trusted artisans near you</p>

<a href="register-artisan.html">
<button>Join as Artisan</button>
</a>

<a href="artisan-dashboard.html">
<button>Artisan Dashboard</button>
</a>

</header>


<div class="services">

<div class="card">
<h3>Electrical</h3>
<p>Electrician</p>
<a href="booking.html?service=Electrician">
<button>Book Now</button>
</a>
</div>

<div class="card">
<h3>Plumbing</h3>
<p>Plumber</p>
<a href="booking.html?service=Plumber">
<button>Book Now</button>
</a>
</div>

<div class="card">
<h3>Woodwork</h3>
<p>Carpenter</p>
<a href="booking.html?service=Carpenter">
<button>Book Now</button>
</a>

<a href="booking.html?service=Mechanic">

</a>
</div>

<h3>Home Painting</h3>
<p>Painter</p>
<a href="booking.html?service=Painter">
<button>Book Now</button>
</a>
</div>

<div class="card">
<h3>Cleaning</h3>
<p>House Cleaner</p>
<a href="booking.html?service=House Cleaner">
<button>Book Now</button>
</a>
</div>

</div>


<div class="map-section">

<h2>Find Services Near You</h2>

<p>Search artisans in your area</p>

<iframe
src="https://www.google.com/maps?q=local+artisan+services&output=embed">
