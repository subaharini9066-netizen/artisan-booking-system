<!DOCTYPE html>
<html>
<head>
<title>Artisan Registration</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
background:white;
max-width:500px;
margin:auto;
padding:20px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#0077ff;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

#qrSection{
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Register as Artisan</h2>

<input id="name" placeholder="Your Name">

<select id="service">

<option>Electrician</option>
<option>Plumber</option>
<option>Carpenter</option>
<option>Mechanic</option>
<option>Painter</option>
<option>House Cleaner</option>

</select>

<input id="phone" placeholder="Phone Number">

<input id="location" placeholder="City / Area">

<button onclick="registerArtisan()">Register</button>

<div id="qrSection"></div>

</div>


<script>

function registerArtisan(){

let artisans = JSON.parse(localStorage.getItem("artisans")) || []

let name=document.getElementById("name").value
let service=document.getElementById("service").value
let phone=document.getElementById("phone").value
let location=document.getElementById("location").value

let artisan={
name:name,
service:service,
phone:phone,
location:location
}

artisans.push(artisan)

localStorage.setItem("artisans",JSON.stringify(artisans))

alert("Registration Successful")

generateQR(phone)

}

function generateQR(phone){

let website="https://sprightly-paletas-a58eab.netlify.app"

let bookingLink=website+"/booking.html?artisan="+phone

let qrImage="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+bookingLink

document.getElementById("qrSection").innerHTML=`

<h3>Your Booking QR Code</h3>

<p>Customers scan this to book your service</p>

<img src="${qrImage}">

<p>${bookingLink}</p>

`

}

</script>

</body>
</html>
